</div>
<div class="flex items-center gap-4">

</div>

<input class="w-16 h-20 text-center font-display-hero text-headline-lg bg-surface-container-lowest border border-outline-variant shadow-sm rounded-2xl otp-input-focus transition-all duration-200" maxlength="1" placeholder="•" type="text"/>
<input class="w-16 h-20 text-center font-display-hero text-headline-lg bg-surface-container-lowest border border-outline-variant shadow-sm rounded-2xl otp-input-focus transition-all duration-200" maxlength="1" placeholder="•" type="text"/>
<input class="w-16 h-20 text-center font-display-hero text-headline-lg bg-surface-container-lowest border border-outline-variant shadow-sm rounded-2xl otp-input-focus transition-all duration-200" maxlength="1" placeholder="•" type="text"/>
<input class="w-16 h-20 text-center font-display-hero text-headline-lg bg-surface-container-lowest border border-outline-variant shadow-sm rounded-2xl otp-input-focus transition-all duration-200" maxlength="1" placeholder="•" type="text"/>
<input class="w-16 h-20 text-center font-display-hero text-headline-lg bg-surface-container-lowest border border-outline-variant shadow-sm rounded-2xl otp-input-focus transition-all duration-200" maxlength="1" placeholder="•" type="text"/>
<input class="w-16 h-20 text-center font-display-hero text-headline-lg bg-surface-container-lowest border border-outline-variant shadow-sm rounded-2xl otp-input-focus transition-all duration-200" maxlength="1" placeholder="•" type="text"/>
</div>
<button class="w-full py-6 bg-primary text-white rounded-3xl font-display-hero text-headline-md chunky-shadow chunky-button-press transition-all flex items-center justify-center gap-3">
<span>Unlock the Library!</span>
<span class="material-symbols-outlined" data-icon="auto_stories">auto_stories</span>
</button>
<div class="mt-8 flex justify-center">
<button class="font-label-bold text-label-bold text-outline hover:text-primary transition-colors flex items-center gap-2">
<span class="material-symbols-outlined" data-icon="help">help</span>
                            I didn't get a code
                        </button>
</div>
</div>
</div>
</main>
