<h2 class="font-headline-md text-cozy-text text-center">What is your name?</h2>
</div>

<div class="relative">
<div class="absolute left-6 top-1/2 -translate-y-1/2">
<span class="material-symbols-outlined text-outline text-3xl" data-icon="fingerprint">fingerprint</span>
</div>
<input class="w-full h-[72px] pl-16 pr-8 bg-surface-container-low font-headline-md text-cozy-text border-2 border-outline-variant rounded-2xl focus:magic-border-pulse focus:outline-none transition-all placeholder:text-outline-variant/60" placeholder="Type your name here..." type="text"/>
</div>
<!-- The Chunky Button -->
<button class="w-full h-[64px] bg-primary-container text-on-primary-fixed font-display-hero text-headline-md rounded-2xl chunky-button-shadow transition-all flex items-center justify-center gap-3">

<span class="material-symbols-outlined" data-icon="rocket_launch">rocket_launch</span>
